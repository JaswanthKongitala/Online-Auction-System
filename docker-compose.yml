version: '3.9'

services:
  mysql:
    image: mysql:8
    container_name: auction-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auction
    ports:
      - "3307:3306"
    volumes:
      - auctiondb:/var/lib/mysql

  backend:
    image: coresume/auction-backend:latest
    container_name: auction-backend
    ports:
      - "8082:8082"
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/auction
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

  frontend:
    image: coresume/auction-frontend:latest
    container_name: auction-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  auctiondb:
